<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Fun Game</title>
    <style>
        /* Replicating the Replit Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .game-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 800;
        }

        p {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s ease;
            text-align: center;
            box-sizing: border-box;
        }

        input[type="number"]:focus {
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #message {
            margin-top: 25px;
            font-size: 18px;
            font-weight: 600;
            min-height: 27px;
        }

        #reset-btn {
            background-color: #2ecc71;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            margin-top: 15px;
            display: none;
        }

        #reset-btn:hover {
            background-color: #27ae60;
        }

        /* Chrome, Safari, Edge, Opera - Remove arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>Number Fun!</h1>
        <p>Guess a number between 1 and 100</p>
        
        <div class="input-group">
            <input type="number" id="guessInput" placeholder="Enter your guess" autocomplete="off">
        </div>
        
        <button onclick="checkGuess()" id="submit-btn">Submit Guess</button>
        
        <p id="message"></p>
        <button onclick="resetGame()" id="reset-btn">Play Again</button>
    </div>

    <script>
        let targetNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;

        const input = document.getElementById('guessInput');
        const message = document.getElementById('message');
        const resetBtn = document.getElementById('reset-btn');
        const submitBtn = document.getElementById('submit-btn');

        function checkGuess() {
            const userGuess = parseInt(input.value);
            
            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                showMessage("Please enter a number (1-100)!", "#e67e22");
                return;
            }

            attempts++;

            if (userGuess === targetNumber) {
                showMessage(`🎉 Correct! It took you ${attempts} tries.`, "#2ecc71");
                input.disabled = true;
                submitBtn.style.display = "none";
                resetBtn.style.display = "block";
            } else if (userGuess < targetNumber) {
                showMessage("Too low! Try again. 👇", "#e74c3c");
                input.value = "";
                input.focus();
            } else {
                showMessage("Too high! Try again. 👆", "#e74c3c");
                input.value = "";
                input.focus();
            }
        }

        function showMessage(text, color) {
            message.textContent = text;
            message.style.color = color;
        }

        function resetGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            input.disabled = false;
            input.value = "";
            message.textContent = "";
            submitBtn.style.display = "block";
            resetBtn.style.display = "none";
            input.focus();
        }

        // Allow "Enter" key to submit
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkGuess();
            }
        });
    </script>
</body>
</html>
